services:
  web:
    # step-5a
    build: .
    ports:
      - "3000:3000"

    # step-5b
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/workshop

    # step-5c
    depends_on:
      db:
        condition: service_healthy

  db:
    # step-5d
    image: postgres:16-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workshop"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

    # step-5e + step-5g
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    # step-5f
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workshop

# step-5h
volumes:
  pgdata: